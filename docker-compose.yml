version: '3.8'

services:
  tempmail:
    image: pptag/tempmail:latest   # or build: .
    container_name: tempmail
    restart: unless-stopped
    ports:
      - "25:25"
      - "127.0.0.1:8080:80"       # bind locally; put a reverse proxy in front
    volumes:
      - ./config.json:/app/config.json
    env_file:
      - .env                       # copy .env.example → .env and fill in values
